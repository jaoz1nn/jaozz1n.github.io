<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

  <!-- TELA 1 -->
  <div id="q1">
    <h1>Letícia, aceita sair comigo? ✨</h1>
    <div class="buttons">
      <button id="yes">Sim</button>
      <button id="no">Não</button>
    </div>
  </div>

  <!-- TELA 2 -->
  <div id="q2" style="display: none;">
    <h2>Escolha um dia</h2>
    <p>Qual dia você está livre?</p>

    <div class="dates">
      <button class="date">18</button>
      <button class="date">19</button>
      <button class="date">20</button>
      <button class="date">21</button>
    </div>
  </div>

  <!-- TELA FINAL -->
  <div id="q3" style="display: none;">
    <h2>Boa escolha 😌</h2>
    <p id="final-text"></p>

    <p style="margin-top:20px;">Olha o lugar que pensei 👀</p>

    <iframe 
      src="https://www.google.com/maps?q=R.+Itapeti,+24+-+Vila+Gomes+Cardim,+São+Paulo&output=embed"
      width="100%" 
      height="200" 
      style="border-radius:12px; border:none;">
    </iframe>

    <br><br>

    <a id="whatsapp-link" href="#" target="_blank">
      <button>Confirmar no WhatsApp</button>
    </a>
  </div>

</div>

<audio id="bg-music" src="earned-it.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
