<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <title>Sim ou Não</title>
  </head>
  <body>
    <div class="card" id="card">
      <div class="question" id="question">
        <p>Quer sair comigo?</p>
        <div class="buttons">
          <button id="yes" class="btn-yes">Sim!</button>
          <button id="no" class="btn-no">Não</button>
        </div>
      </div>

      <div class="answer" id="answer">
        <p>Agenda marcada.<br>Te encontro às 17h <br> dia 03/05 <br> <span class="blink">😉</span> </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>


  <audio id="bg-music" src="earned-it.mp3"></audio>

</html>
