<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

  <!-- TELA 1 -->
  <div id="q1">
    <h1>Letícia, aceita sair comigo? ✨</h1>
    <button id="yes">Sim</button>
    <button id="no">Não</button>
  </div>

  <!-- TELA 2 -->
  <div id="q2" style="display:none;">
    <h2>O que você prefere? 😄</h2>
    <button id="combo">Cinema + Restaurante</button>
    <button id="resto">Só Restaurante</button>
  </div>

  <!-- TELA 3 -->
  <div id="q3" style="display:none;">
    <h2>Escolha um dia disponível</h2>
    <div class="dates">
      <button class="date">18</button>
      <button class="date">19</button>
      <button class="date">21</button>
    </div>
  </div>

  <!-- TELA 4 (filmes) -->
  <div id="q4" style="display:none;">
    <h2>Escolhe o filme 🎬</h2>

    <div class="movies">
      <div class="movie" data-filme="The Drama">
        <img src="drama.jpg">
        <p>The Drama</p>
      </div>

      <div class="movie" data-filme="Project Hall">
        <img src="project.jpg">
        <p>Project Hall</p>
      </div>
    </div>
  </div>

  <!-- FINAL -->
  <div id="q5" style="display:none;">
    <h2>Boa escolha 😌</h2>
    <p id="final-text"></p>

    <p style="margin-top:20px;">Olha o lugar que pensei 👀</p>

    <iframe 
      src="https://www.google.com/maps?q=R.+Itapeti,+24+-+Vila+Gomes+Cardim,+São+Paulo&output=embed"
      width="100%" height="200" style="border-radius:12px; border:none;">
    </iframe>

    <br><br>

    <a id="whatsapp-link" target="_blank">
      <button>Confirmar no WhatsApp</button>
    </a>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
