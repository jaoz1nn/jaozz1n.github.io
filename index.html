<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

  <!-- TELA 1 -->
  <div id="q1">
    <h1>Letícia, aceita sair comigo? ✨</h1>
    <div class="buttons">
      <button id="yes">Sim</button>
      <button id="no">Não</button>
    </div>
  </div>

  <!-- TELA 2 -->
  <div id="q2" style="display: none;">
    <h2>Escolha um dia</h2>
    <p>Qual dia você está livre?</p>

    <div class="dates">
      <button class="date">18</button>
      <button class="date">19</button>
      <button class="date">20</button>
      <button class="date">21</button>
    </div>
  </div>

  <!-- TELA FINAL -->
  <div id="q3" style="display: none;">
    <h2>Reserva confirmada 🎉</h2>
    <p>Perfeito, Letícia! Agora me manda uma foto do dia 😄</p>
  </div>

</div>

<audio id="bg-music" src="earned-it.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
